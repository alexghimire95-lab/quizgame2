<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QuizGame | Início</title>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Inter:wght@300;400;500;600&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: radial-gradient(circle at top, #0b0f12, #050607);
      color: #eaeaea;
      overflow-x: hidden;
      line-height: 1.6;
      letter-spacing: 0.3px;
    }

    /* NAVBAR */
    .navbar {
      width: 100%;
      padding: 20px 50px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: fixed;
      top: 0;
      left: 0;
      background: rgba(10, 15, 20, 0.85);
      border-bottom: 1px solid rgba(0,255,240,0.2);
      backdrop-filter: blur(10px);
      z-index: 3000;
    }

    .logo {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.9rem;
      font-weight: 700;
      color: #00fff0;
      letter-spacing: 2px;
      text-transform: uppercase;
      text-shadow: 0 0 12px rgba(0,255,240,0.6);
    }

    /* MENU BUTTON */
    .menu-btn {
      background: transparent;
      color: #00fff0;
      padding: 10px 18px;
      border-radius: 8px;
      border: 1px solid #00fff0;
      font-weight: 500;
      cursor: pointer;
      transition: 0.3s ease;
    }

    .menu-btn:hover {
      background: #00fff0;
      color: #000;
      box-shadow: 0 0 15px rgba(0,255,240,0.6);
    }

    /* SIDEBAR */
    .sidebar {
      position: fixed;
      top: 0;
      right: -320px;
      width: 300px;
      height: 100vh;
      background: rgba(10, 15, 20, 0.97);
      border-left: 1px solid rgba(0,255,240,0.2);
      padding: 50px 30px;
      transition: 0.4s ease;
      z-index: 3500;
      backdrop-filter: blur(12px);
    }

    .sidebar.active {
      right: 0;
    }

    .sidebar h2 {
      font-family: 'Orbitron', sans-serif;
      color: #00fff0;
      text-align: center;
      margin-bottom: 35px;
      letter-spacing: 2px;
    }

    .sidebar a {
      display: block;
      padding: 14px 12px;
      margin: 14px 0;
      color: #cfcfcf;
      text-decoration: none;
      font-size: 1rem;
      border-radius: 8px;
      transition: 0.3s ease;
    }

    .sidebar a:hover {
      background: rgba(0,255,240,0.1);
      color: #00fff0;
      transform: translateX(5px);
    }

    /* MAIN CONTENT */
    main {
      text-align: center;
      margin-top: 180px;
      padding: 20px;
    }

    h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: 2.8rem;
      color: #00fff0;
      margin-bottom: 25px;
      letter-spacing: 1px;
      text-shadow: 0 0 20px rgba(0,255,240,0.4);
    }

    p {
      max-width: 650px;
      margin: auto;
      font-size: 1.15rem;
      color: #c7c7c7;
      margin-bottom: 45px;
      font-weight: 300;
    }

    /* BUTTON */
    .btn {
      padding: 14px 35px;
      background: linear-gradient(135deg, #00fff0, #00bfb2);
      color: #000;
      border-radius: 10px;
      font-weight: 600;
      text-decoration: none;
      margin: 10px;
      display: inline-block;
      transition: 0.3s ease;
      box-shadow: 0 8px 25px rgba(0,255,240,0.25);
    }

    .btn:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 30px rgba(0,255,240,0.4);
    }

    /* FOOTER */
    .footer-bar {
      width: 100%;
      background: #0a0f14;
      padding: 30px 0;
      text-align: center;
      margin-top: 100px;
      border-top: 1px solid rgba(0,255,240,0.2);
    }

    .footer-bar p {
      color: #9f9f9f;
      font-size: 0.95rem;
      font-weight: 300;
    }

    /* RESPONSIVE */
    @media (max-width: 768px) {
      .navbar {
        padding: 15px 25px;
      }

      h1 {
        font-size: 2.2rem;
      }

      .sidebar {
        width: 260px;
      }
    }
  </style>
</head>

<body>

  <!-- NAVBAR -->
  <header class="navbar">
    <div class="logo">QuizGame</div>
    <div class="menu-btn" onclick="toggleMenu()">☰ Menu</div>
  </header>

  <!-- SIDEBAR -->
  <div class="sidebar" id="sidebar">
    <h2>Menu</h2>
    <a href="index.html">Início</a>
    <a href="Play/index.php">Jogar</a>
    <a href="Sobre.html">Sobre</a>
    <a href="Contactos.php">Contactos</a>
    <a href="BackOffice/index.php">BackOffice</a>
  </div>

  <!-- CONTENT -->
  <main>
    <h1>Bem-vindo ao QuizGame 🎮</h1>
    <p>
      Desafia o teu conhecimento com perguntas de escolha múltipla em diversas categorias.
      Aprende, diverte-te e conquista o topo do ranking!
    </p>

    <a href="Play/index.php" class="btn">Jogar</a>
  </main>

  <footer class="footer-bar">
    <p>© 2026 QuizGame | Desenvolvido com 💙 por Ti</p>
  </footer>

  <script>
    function toggleMenu() {
      document.getElementById("sidebar").classList.toggle("active");
    }

    document.addEventListener('click', function(event) {
      const sidebar = document.getElementById('sidebar');
      const menuBtn = document.querySelector('.menu-btn');

      if (sidebar.classList.contains('active') &&
          !sidebar.contains(event.target) &&
          !menuBtn.contains(event.target)) {
        sidebar.classList.remove('active');
      }
    });
  </script>

</body>
</html>
